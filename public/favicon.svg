    <rect x="3.56" y="0" width="3.56" height="6" fill="#00A84D"/>
    <rect x="7.11" y="0" width="3.56" height="6" fill="#EF7C1C"/>
    <rect x="10.67" y="0" width="3.56" height="6" fill="#00A5DE"/>
    <rect x="14.22" y="0" width="3.56" height="6" fill="#996CAC"/>
    <rect x="17.78" y="0" width="3.56" height="6" fill="#CD7C2F"/>
    <rect x="21.33" y="0" width="3.56" height="6" fill="#747F00"/>
    <rect x="24.89" y="0" width="3.56" height="6" fill="#E6186C"/>
    <rect x="28.44" y="0" width="3.56" height="6" fill="#BDB092"/>
  </g>
  <!-- 중앙 흰색 'M' -->
  <text x="16" y="24" font-family="Arial, sans-serif" font-weight="bold" font-size="17" fill="white" text-anchor="middle">M</text>
